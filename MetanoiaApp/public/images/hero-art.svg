<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Solar panels at sunrise">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a1124"/>
      <stop offset="38%" stop-color="#14244c"/>
      <stop offset="62%" stop-color="#1B499F"/>
      <stop offset="78%" stop-color="#2a3f74"/>
      <stop offset="100%" stop-color="#0c1428"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFD86B" stop-opacity="0.95"/>
      <stop offset="28%" stop-color="#EFB21E" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#EFB21E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunDisc" cx="42%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#FFE39A"/>
      <stop offset="55%" stop-color="#F2BE3C"/>
      <stop offset="100%" stop-color="#E7A30F"/>
    </radialGradient>
    <radialGradient id="horizon" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#EFB21E" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#EFB21E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%"  stop-color="#2b4a8f"/>
      <stop offset="55%" stop-color="#15294f"/>
      <stop offset="100%" stop-color="#0c1834"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <!-- warm horizon wash -->
  <ellipse cx="1120" cy="640" rx="1100" ry="260" fill="url(#horizon)"/>

  <!-- god rays -->
  <g fill="#FFD86B" opacity="0.06">
    <polygon points="1150,400 760,1000 980,1000"/>
    <polygon points="1150,400 1040,1000 1190,1000"/>
    <polygon points="1150,400 1320,1000 1470,1000"/>
    <polygon points="1150,400 250,1000 470,1000"/>
  </g>

  <!-- sun -->
  <circle cx="1150" cy="392" r="300" fill="url(#sunGlow)"/>
  <circle cx="1150" cy="392" r="66" fill="url(#sunDisc)"/>
  <circle cx="1150" cy="392" r="66" fill="none" stroke="#FFE39A" stroke-opacity="0.5" stroke-width="2"/>

  <!-- distant hills -->
  <path d="M0,612 C 360,560 760,648 1120,604 C 1360,576 1500,612 1600,600 L1600,720 L0,720 Z" fill="#16264e" opacity="0.85"/>
  <path d="M0,664 C 420,624 720,700 1080,664 C 1340,640 1520,672 1600,660 L1600,800 L0,800 Z" fill="#0f1c3c"/>

  <!-- solar panel array (angled plane) -->
  <g>
    <polygon points="340,730 1180,600 1400,820 520,1010" fill="url(#panel)"/>
    <!-- gold reflection cells (sun side) -->
    <polygon points="844,652 1012,626 1065,684 895,713" fill="#EFB21E" opacity="0.55"/>
    <polygon points="676,678 844,652 895,713 727,739" fill="#EFB21E" opacity="0.30"/>
    <polygon points="1012,626 1180,600 1237,656 1065,684" fill="#FFD86B" opacity="0.35"/>
    <!-- grid: rows -->
    <g stroke="#F4F1EA" stroke-opacity="0.28" stroke-width="2.5">
      <line x1="385" y1="800" x2="1235" y2="655"/>
      <line x1="430" y1="870" x2="1290" y2="710"/>
      <line x1="475" y1="940" x2="1345" y2="765"/>
      <!-- columns -->
      <line x1="508" y1="704" x2="696" y2="972"/>
      <line x1="676" y1="678" x2="872" y2="934"/>
      <line x1="844" y1="652" x2="1048" y2="896"/>
      <line x1="1012" y1="626" x2="1224" y2="858"/>
    </g>
    <!-- bright top edge -->
    <line x1="340" y1="730" x2="1180" y2="600" stroke="#F4F1EA" stroke-opacity="0.55" stroke-width="3"/>
    <!-- support post -->
    <line x1="860" y1="805" x2="860" y2="900" stroke="#0a1428" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
